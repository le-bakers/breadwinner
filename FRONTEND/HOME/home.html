<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your ledger — BreadWinner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="home.css">
</head>
<body>

<header class="nav">
  <div class="nav__inner">
    <span class="nav__mark">BreadWinner</span>
    <div class="nav__right">
      <span class="nav__greeting" id="greeting">Welcome back</span>
      <button class="nav__logout" id="logout-btn">Sign out</button>
    </div>
  </div>
</header>

<main class="dash">

  <div class="dash__head">
    <p class="eyebrow">Your ledger</p>
    <h1 class="dash__title">Every receipt, tallied.</h1>
  </div>

  <!-- ============ STATS GRID ============ -->
  <section class="stats" id="stats-grid" aria-label="Summary statistics">
    <!-- populated by home.js -->
  </section>

  <!-- ============ RECEIPTS LIST ============ -->
  <section class="receipts">
    <div class="receipts__head">
      <h2 class="section-title section-title--left">Scanned receipts</h2>
      <button class="btn btn--gold" id="scan-btn">+ Scan a receipt</button>
    </div>

    <div class="receipts__list" id="receipts-list" role="list">
      <!-- populated by home.js -->
    </div>

    <p class="receipts__empty" id="receipts-empty" hidden>
      No receipts yet. Scan your first one to start your ledger.
    </p>
  </section>

</main>

<!-- ============ RECEIPT DETAIL MODAL ============ -->
<div class="modal" id="receipt-modal" aria-hidden="true">
  <div class="modal__backdrop" id="modal-backdrop"></div>
  <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <button class="modal__close" id="modal-close" aria-label="Close receipt detail">&times;</button>
    <div class="modal__body" id="modal-body">
      <!-- populated by home.js -->
    </div>
  </div>
</div>

<script src="home.js"></script>
</body>
</html>
