    <path d="M0 200 L12 190 L24 200 L36 190 L48 200 L60 190 L72 200 L84 190 L96 200 L108 190 L120 200 L132 190 L150 200 L150 0" fill="none"/>
    <rect x="18" y="20" width="114" height="10" rx="3" fill="#1F2937"/>
