<svg viewBox="0 0 400 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a statistics dashboard with charts and savings reports">
  <defs>
    <linearGradient id="bgGrad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAF8"/>
      <stop offset="1" stop-color="#DCFCE7"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="400" height="340" rx="28" fill="url(#bgGrad4)"/>

  <g transform="translate(55,55)">
    <rect x="0" y="0" width="290" height="200" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>

    <!-- bar chart -->
    <g transform="translate(24,120)">
      <rect x="0" y="20" width="22" height="40" rx="4" fill="#DCFCE7"/>
      <rect x="32" y="0" width="22" height="60" rx="4" fill="#22C55E"/>
      <rect x="64" y="30" width="22" height="30" rx="4" fill="#DCFCE7"/>
      <rect x="96" y="10" width="22" height="50" rx="4" fill="#16A34A"/>
      <rect x="128" y="24" width="22" height="36" rx="4" fill="#DCFCE7"/>
    </g>

    <!-- donut -->
    <g transform="translate(220,60)">
      <circle cx="0" cy="0" r="36" fill="none" stroke="#DCFCE7" stroke-width="14"/>
      <circle cx="0" cy="0" r="36" fill="none" stroke="#22C55E" stroke-width="14" stroke-dasharray="150 226" stroke-linecap="round" transform="rotate(-90)"/>
    </g>

    <rect x="24" y="24" width="90" height="9" rx="3" fill="#1F2937"/>
    <rect x="24" y="42" width="60" height="6" rx="3" fill="#9CA3AF"/>
  </g>

  <!-- floating stat card -->
  <g transform="translate(230,220)">
    <rect x="0" y="0" width="120" height="56" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    <rect x="14" y="14" width="60" height="7" rx="3" fill="#9CA3AF"/>
    <rect x="14" y="30" width="46" height="12" rx="3" fill="#22C55E"/>
  </g>
</svg>
